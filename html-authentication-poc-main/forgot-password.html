<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - AuthApp</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">

  <div class="dots"></div>

  <!-- Bootstrap Card Component -->
  <div class="auth-card">

    <div class="card-icon">
      <i class="bi bi-key-fill"></i>
    </div>

    <h1 class="card-title">Forgot Password?</h1>
    <p class="card-subtitle">
      Enter your registered email address and we will send you a password reset link.
    </p>

    <!-- Forgot Password Form - Bootstrap form classes + proper layout -->
    <form action="reset-password.html">

      <!-- Email input - Bootstrap form-control, form-label -->
      <div class="field-group">
        <label for="email" class="form-label">
          <i class="bi bi-envelope me-1"></i>Email Address
        </label>
        <input
          type="email"
          class="form-control"
          id="email"
          name="email"
          placeholder="Enter your registered email"
        />
      </div>

      <!-- proper spacing using Bootstrap mb-4 utility -->
      <div class="mb-4"></div>

      <!-- Submit Button - Bootstrap styled -->
      <a href="reset-password.html" class="btn-main mb-4">
        <i class="bi bi-send me-1"></i> Send Reset Link
      </a>

    </form>

    <!-- Back link - visually appealing -->
    <p class="card-footer-text">
      <a href="login.html" class="link-primary">
        <i class="bi bi-arrow-left me-1"></i> Back to Sign In
      </a>
    </p>

  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
