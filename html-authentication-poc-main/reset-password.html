<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - AuthApp</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">

  <div class="dots"></div>

  <!-- Bootstrap Card Component -->
  <div class="auth-card">

    <div class="card-icon">
      <i class="bi bi-shield-check-fill"></i>
    </div>

    <h1 class="card-title">Reset Password</h1>
    <p class="card-subtitle">Create a strong new password for your account.</p>

    <!-- Password hint box -->
    <div class="hint-box">
      <strong style="color: #212121; font-size: 0.82rem;">Password must include:</strong>
      <ul>
        <li>Minimum 8 characters</li>
        <li>At least one uppercase letter (A–Z)</li>
        <li>At least one number (0–9)</li>
        <li>At least one special character (!@#$)</li>
      </ul>
    </div>

    <!-- Reset Password Form - Bootstrap Card + form-control -->
    <form action="login.html">

      <!-- New Password - Bootstrap form-label + form-control -->
      <div class="field-group">
        <label for="newpass" class="form-label">
          <i class="bi bi-lock me-1"></i>New Password
        </label>
        <!-- Bootstrap input-group for password visibility toggle icon -->
        <div class="input-group">
          <input
            type="password"
            class="form-control"
            id="newpass"
            name="newpass"
            placeholder="Enter new password"
            style="border-right: none; border-radius: 10px 0 0 10px;"
          />
          <!-- Password visibility toggle - Bootstrap Icons -->
          <span
            class="input-group-text"
            style="border: 1.5px solid #E0E0E0; border-left: none;
                   border-radius: 0 10px 10px 0; background: #FAFBFF;
                   color: #757575; cursor: pointer;"
          >
            <i class="bi bi-eye"></i>
          </span>
        </div>
      </div>

      <!-- Confirm Password - Bootstrap input-group with toggle icon -->
      <div class="field-group">
        <label for="confpass" class="form-label">
          <i class="bi bi-shield-lock me-1"></i>Confirm New Password
        </label>
        <div class="input-group">
          <input
            type="password"
            class="form-control"
            id="confpass"
            name="confpass"
            placeholder="Re-enter new password"
            style="border-right: none; border-radius: 10px 0 0 10px;"
          />
          <!-- Password visibility toggle icon - Bootstrap Icons -->
          <span
            class="input-group-text"
            style="border: 1.5px solid #E0E0E0; border-left: none;
                   border-radius: 0 10px 10px 0; background: #FAFBFF;
                   color: #757575; cursor: pointer;"
          >
            <i class="bi bi-eye"></i>
          </span>
        </div>
      </div>

      <!-- Update Password Button - Bootstrap styled -->
      <div class="mt-4">
        <a href="login.html" class="btn-main">
          <i class="bi bi-check-circle me-1"></i> Update Password
        </a>
      </div>

    </form>

    <p class="card-footer-text mt-3">
      <a href="login.html" class="link-primary">
        <i class="bi bi-arrow-left me-1"></i> Back to Sign In
      </a>
    </p>

  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
