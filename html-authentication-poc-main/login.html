<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AuthApp</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">

  <div class="dots"></div>

  <!-- Bootstrap Card Component - centered on page -->
  <div class="auth-card">

    <!-- Brand Icon -->
    <div class="card-icon">
      <i class="bi bi-shield-lock-fill"></i>
    </div>

    <h1 class="card-title">Welcome Back</h1>
    <p class="card-subtitle">Sign in to continue to your account</p>

    <!-- Login Form - Bootstrap form-control, form-label classes -->
    <form action="dashboard.html">

      <!-- Email - Bootstrap form classes -->
      <div class="field-group">
        <label for="email" class="form-label">
          <i class="bi bi-envelope me-1"></i>Email Address
        </label>
        <input
          type="email"
          class="form-control"
          id="email"
          name="email"
          placeholder="you@example.com"
        />
      </div>

      <!-- Password - Bootstrap form classes -->
      <div class="field-group">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label for="password" class="form-label mb-0">
            <i class="bi bi-lock me-1"></i>Password
          </label>
          <!-- Visually appealing link -->
          <a href="forgot-password.html" class="link-soft">Forgot password?</a>
        </div>
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
          placeholder="Enter your password"
        />
      </div>

      <!-- Remember me - Bootstrap form-check -->
      <div class="form-check mb-4 mt-1">
        <input class="form-check-input" type="checkbox" id="remember" name="remember" />
        <label class="form-check-label" for="remember">
          Keep me signed in
        </label>
      </div>

      <!-- Login Button - Bootstrap button styled with custom class -->
      <a href="dashboard.html" class="btn-main mb-3">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
      </a>

    </form>

    <div class="or-line">or</div>

    <!-- Make links visually appealing -->
    <p class="card-footer-text">
      Don't have an account?
      <a href="register.html" class="link-primary ms-1">Create one</a>
    </p>

  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
