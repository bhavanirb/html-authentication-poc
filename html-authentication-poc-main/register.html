<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - AuthApp</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">

  <div class="dots"></div>

  <!-- Bootstrap Card Component -->
  <div class="auth-card auth-card-wide">

    <div class="card-icon">
      <i class="bi bi-person-plus-fill"></i>
    </div>

    <h1 class="card-title">Create Account</h1>
    <p class="card-subtitle">Fill in the details below to get started</p>

    <!-- Registration Form - Bootstrap form classes + utilities -->
    <form action="login.html">

      <!-- Name Row - Bootstrap Grid System -->
      <div class="row g-3 mb-3">
        <div class="col-sm-6">
          <label for="fname" class="form-label">
            <i class="bi bi-person me-1"></i>First Name
          </label>
          <input
            type="text"
            class="form-control"
            id="fname"
            name="fname"
            placeholder="John"
          />
        </div>
        <div class="col-sm-6">
          <label for="lname" class="form-label">Last Name</label>
          <input
            type="text"
            class="form-control"
            id="lname"
            name="lname"
            placeholder="Doe"
          />
        </div>
      </div>

      <!-- Email -->
      <div class="field-group">
        <label for="email" class="form-label">
          <i class="bi bi-envelope me-1"></i>Email Address
        </label>
        <input
          type="email"
          class="form-control"
          id="email"
          name="email"
          placeholder="you@example.com"
        />
      </div>

      <!-- Phone - Bootstrap form class -->
      <div class="field-group">
        <label for="phone" class="form-label">
          <i class="bi bi-telephone me-1"></i>Phone Number
        </label>
        <input
          type="tel"
          class="form-control"
          id="phone"
          name="phone"
          placeholder="+91 98765 43210"
        />
      </div>

      <!-- Password - Bootstrap form-control -->
      <div class="field-group">
        <label for="password" class="form-label">
          <i class="bi bi-lock me-1"></i>Password
        </label>
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
          placeholder="Minimum 8 characters"
        />
      </div>

      <!-- Confirm Password -->
      <div class="field-group">
        <label for="confirm" class="form-label">
          <i class="bi bi-shield-check me-1"></i>Confirm Password
        </label>
        <input
          type="password"
          class="form-control"
          id="confirm"
          name="confirm"
          placeholder="Re-enter your password"
        />
      </div>

      <!-- Terms - Bootstrap form-check + spacing utilities -->
      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" id="terms" name="terms" />
        <label class="form-check-label" for="terms">
          I agree to the
          <a href="#" class="link-primary">Terms</a> and
          <a href="#" class="link-primary">Privacy Policy</a>
        </label>
      </div>

      <!-- Submit Button - Bootstrap button classes -->
      <a href="login.html" class="btn-main mb-3">
        <i class="bi bi-person-check me-1"></i> Create Account
      </a>

    </form>

    <p class="card-footer-text">
      Already have an account?
      <a href="login.html" class="link-primary ms-1">Sign in</a>
    </p>

  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
